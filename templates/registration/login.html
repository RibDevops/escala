{% extends 'base.html' %}
{% load static %}

{% block titulo %}Acesso ao Sistema{% endblock %}

{% block conteudo %}
<div class="login-card">
    <div class="text-center mb-3">
        <img src="{% static 'img/logo_escala.png' %}" alt="Logo Sistema de Escala"
             style="width:72px;height:72px;object-fit:contain;">
    </div>
    <h1>Sistema de Escala</h1>
    <div class="sub">Acesso restrito</div>

    {% if form.errors %}
        <div class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-triangle-fill"></i>
            Usuário ou senha inválidos.
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label" for="id_username">Usuário</label>
            <input type="text" name="username" id="id_username" class="form-control" autofocus required>
        </div>
        <div class="mb-3">
            <label class="form-label" for="id_password">Senha</label>
            <input type="password" name="password" id="id_password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-mil w-100">
            <i class="bi bi-key-fill"></i> Entrar
        </button>
        <input type="hidden" name="next" value="{{ next }}">
    </form>
</div>
{% endblock %}
